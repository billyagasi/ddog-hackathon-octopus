# =============================================================================
# Services Stack — All Microservices
# Load Generator + Order Service + Inventory Service + Payment Service + Payment Gateway Mock
#
# Prerequisites:
#   1. Start platform: docker-compose -f docker-compose.platform.yml up -d
#   2. Start DD Agent:
#        docker run -d --name dd-agent \
#          -v /var/run/docker.sock:/var/run/docker.sock:ro \
#          -v /proc/:/host/proc/:ro -v /sys/fs/cgroup/:/host/sys/fs/cgroup:ro \
#          -e DD_API_KEY=<YOUR_KEY> -e DD_SITE=us5.datadoghq.com \
#          -p 8126:8126 -p 8125:8125/udp \
#          gcr.io/datadoghq/agent:latest
#   3. Run: docker-compose -f docker-compose.services.yml up -d --build
# =============================================================================

version: "3.8"

services:
  # ── Payment Gateway Mock (external dependency) ──────────────────────────
  payment-gateway-mock:
    build:
      context: ./ms-processing-payment/payment-gateway-mock
      dockerfile: Dockerfile
    image: payment-gateway-mock:latest
    container_name: svc-payment-gateway-mock
    restart: unless-stopped
    environment:
      DD_AGENT_HOST: ${DD_AGENT_HOST:-host.docker.internal}
      DD_TRACE_AGENT_PORT: ${DD_TRACE_AGENT_PORT:-8126}
      DD_ENV: ${DD_ENV:-hackathon}
      DD_SERVICE: payment-gateway
      DD_VERSION: ${DD_VERSION:-1.0.0}
      DD_TAGS: ${DD_TAGS:-team:platform,region:ap-southeast}
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - platform-network

  # ── Order Service (HTTP + Kafka Consumer) ───────────────────────────────
  order-service:
    build:
      context: ./ms-order
      dockerfile: Dockerfile
    image: order-service:latest
    container_name: svc-order-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DD_AGENT_HOST: ${DD_AGENT_HOST:-host.docker.internal}
      DD_TRACE_AGENT_PORT: ${DD_TRACE_AGENT_PORT:-8126}
      DD_ENV: ${DD_ENV:-hackathon}
      DD_SERVICE: order-service
      DD_VERSION: ${DD_VERSION:-1.0.0}
      DD_TAGS: ${DD_TAGS:-team:platform,region:ap-southeast}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-payments}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
      HTTP_PORT: "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - platform-network

  # ── Inventory Service (Kafka Consumer) ──────────────────────────────────
  inventory-service:
    build:
      context: ./ms-inventory
      dockerfile: Dockerfile
    image: inventory-service:latest
    container_name: svc-inventory-service
    restart: unless-stopped
    depends_on:
      - order-service
    environment:
      DD_AGENT_HOST: ${DD_AGENT_HOST:-host.docker.internal}
      DD_TRACE_AGENT_PORT: ${DD_TRACE_AGENT_PORT:-8126}
      DD_ENV: ${DD_ENV:-hackathon}
      DD_SERVICE: inventory-service
      DD_VERSION: ${DD_VERSION:-1.0.0}
      DD_TAGS: ${DD_TAGS:-team:platform,region:ap-southeast}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-payments}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
    networks:
      - platform-network

  # ── Payment Service (Kafka Consumer + Elasticsearch) ────────────────────
  payment-service:
    build:
      context: ./ms-processing-payment/payment-service
      dockerfile: Dockerfile
    image: payment-service:latest
    container_name: svc-payment-service
    restart: unless-stopped
    depends_on:
      payment-gateway-mock:
        condition: service_healthy
      inventory-service:
        condition: service_started
    environment:
      DD_AGENT_HOST: ${DD_AGENT_HOST:-host.docker.internal}
      DD_TRACE_AGENT_PORT: ${DD_TRACE_AGENT_PORT:-8126}
      DD_ENV: ${DD_ENV:-hackathon}
      DD_SERVICE: payment-service
      DD_VERSION: ${DD_VERSION:-1.0.0}
      DD_TAGS: ${DD_TAGS:-team:platform,region:ap-southeast}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-payments}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      ELASTICSEARCH_USER: ${ELASTICSEARCH_USER:-elastic}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:-elastic}
      PAYMENT_GATEWAY_URL: ${PAYMENT_GATEWAY_URL:-http://payment-gateway-mock:8081}
    networks:
      - platform-network

  # ── Load Generator (traffic simulator) ─────────────────────────────────
  load-generator:
    build:
      context: ./ms-load-generator
      dockerfile: Dockerfile
    image: load-generator:latest
    container_name: svc-load-generator
    restart: unless-stopped
    depends_on:
      - order-service
    environment:
      DD_AGENT_HOST: ${DD_AGENT_HOST:-host.docker.internal}
      DD_TRACE_AGENT_PORT: ${DD_TRACE_AGENT_PORT:-8126}
      DD_ENV: ${DD_ENV:-hackathon}
      DD_SERVICE: load-generator
      DD_VERSION: ${DD_VERSION:-1.0.0}
      DD_TAGS: ${DD_TAGS:-team:platform,region:ap-southeast}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL:-http://order-service:8080}
      WORKERS: ${WORKERS:-5}
      RPS: ${RPS:-10}
      DURATION_SECONDS: ${DURATION_SECONDS:-0}
    networks:
      - platform-network

networks:
  platform-network:
    name: platform-network
    external: true
